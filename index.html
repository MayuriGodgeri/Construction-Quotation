<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pankaj Construction Billing</title>

<style>

body{
font-family:Arial;
margin:40px;
background:#f5f5f5;
}

.container{
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

/* HEADER */

.header{
background:#2e8b57;
color:#fff;
text-align:center;
padding:18px;
margin-bottom:20px;
}

.header h1{
margin:0;
}

.address{
font-size:14px;
margin-top:5px;
}

.contact{
font-size:14px;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
table-layout:auto;
}

table th,table td{
border:1px solid #ccc;
padding:10px;
vertical-align:top;
}

table th{
background:#eee;
}

/* PARTICULAR COLUMN */

td:nth-child(2),
th:nth-child(2){
width:45%;
text-align:left;
word-wrap:break-word;
white-space:normal;
}

/* INPUTS */

textarea,input{
width:100%;
border:none;
outline:none;
font-family:Arial;
font-size:14px;
background:transparent;
}

textarea{
resize:none;
overflow:hidden;
min-height:40px;
text-align:left;
white-space:pre-wrap;
word-break:break-word;
}

/* AUTO EXPAND TEXTAREA */

textarea{
height:auto;
}

textarea:focus{
outline:none;
}

/* BUTTONS */

.btn{
padding:10px 15px;
margin:10px 5px;
border:none;
background:#007bff;
color:#fff;
cursor:pointer;
border-radius:5px;
}

.btn-danger{
background:red;
}

/* TOTAL */

.total{
text-align:right;
font-size:18px;
margin-top:20px;
}

/* PRINT SETTINGS */

@media print{

body{
background:#fff;
}

.header{
background:#2e8b57 !important;
color:#fff !important;
-webkit-print-color-adjust:exact;
print-color-adjust:exact;
}

.btn{
display:none;
}

.action-col,
th:last-child{
display:none;
}

textarea,input{
border:none;
background:transparent;
}

/* IMPORTANT FOR WRAPPING */

td,th{
white-space:normal !important;
word-break:break-word !important;
overflow:visible !important;
}

/* allow page break properly */

tr{
page-break-inside:avoid;
}

}

</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>Pankaj Construction</h1>

<div class="address">
Hno: 750/A Portavado, Siolim, Bardez Goa - 403517
</div>

<div class="contact">
Contact: 7796174991
</div>

</div>

<table id="billingTable">

<thead>
<tr>
<th>Sr No</th>
<th>Particular</th>
<th>Size</th>
<th>Rate</th>
<th>Amount</th>
<th class="action-col">Action</th>
</tr>
</thead>

<tbody></tbody>

</table>

<button class="btn" onclick="addRow()">+ Add Row</button>
<button class="btn" onclick="window.print()">Print / Save PDF</button>

<div class="total">
<strong>Total Work Charge: ₹ <span id="total">0</span></strong>
</div>

</div>

<script>

let table=document.getElementById("billingTable").getElementsByTagName('tbody')[0];

function addRow(){

let rowCount=table.rows.length;

let row=table.insertRow();

row.innerHTML=`
<td>${rowCount+1}</td>

<td>
<textarea rows="2" oninput="autoGrow(this)" placeholder="Enter work details"></textarea>
</td>

<td>
<input type="text" placeholder="Enter size">
</td>

<td>
<input type="number" placeholder="Rate">
</td>

<td>
<input type="number" value="0" oninput="calculateTotal()">
</td>

<td class="action-col">
<button class="btn btn-danger" onclick="deleteRow(this)">X</button>
</td>
`;

}

function deleteRow(btn){

let row=btn.parentNode.parentNode;
row.remove();

updateSerial();
calculateTotal();

}

function updateSerial(){

let rows=table.rows;

for(let i=0;i<rows.length;i++){
rows[i].cells[0].innerHTML=i+1;
}

}

function calculateTotal(){

let total=0;
let rows=table.rows;

for(let i=0;i<rows.length;i++){

let amount=rows[i].cells[4].children[0].value;

total+=parseFloat(amount)||0;

}

document.getElementById("total").innerHTML=total.toLocaleString("en-IN");

}

/* AUTO EXPAND TEXTAREA */

function autoGrow(element){

element.style.height="auto";
element.style.height=(element.scrollHeight)+"px";

}

</script>

</body>
</html>
