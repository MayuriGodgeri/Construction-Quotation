<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pankaj Construction Billing</title>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 40px;
        background: #f5f5f5;
    }

    .container {
        background: #fff;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h1 {
        text-align: center;
        margin-bottom: 5px;
    }

    .contact {
        text-align: center;
        margin-bottom: 20px;
        font-size: 14px;
    }

    table {
        width: 100%;
        border-collapse: collapse;
    }

    table th, table td {
        border: 1px solid #ccc;
        padding: 10px;
        text-align: center;
    }

    table th {
        background: #eee;
    }

    input {
        width: 100%;
        border: none;
        text-align: center;
    }

    .btn {
        padding: 10px 15px;
        margin: 10px 5px;
        border: none;
        background: #007bff;
        color: #fff;
        cursor: pointer;
        border-radius: 5px;
    }

    .btn-danger {
        background: red;
    }

    .total {
        text-align: right;
        font-size: 18px;
        margin-top: 20px;
    }

    @media print {
        .btn {
            display: none;
        }
        body {
            background: #fff;
        }
    }
</style>
</head>
<body>

<div class="container">
    <h1>Pankaj Construction</h1>
    <div class="contact">Contact: 7796174991</div>

    <table id="billingTable">
        <thead>
            <tr>
                <th>Sr No</th>
                <th>Particular</th>
                <th>Size</th>
                <th>Rate</th>
                <th>Amount</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <button class="btn" onclick="addRow()">+ Add Row</button>
    <button class="btn" onclick="window.print()">Print / Save PDF</button>

    <div class="total">
        <strong>Total Work Charge: ₹ <span id="total">0</span></strong>
    </div>
</div>

<script>
let table = document.getElementById("billingTable").getElementsByTagName('tbody')[0];

function addRow() {
    let rowCount = table.rows.length;
    let row = table.insertRow();

    row.innerHTML = `
        <td>${rowCount + 1}</td>
        <td><input type="text" placeholder="Enter work"></td>
        <td><input type="text" placeholder="Enter size"></td>
        <td><input type="number" placeholder="Rate"></td>
        <td><input type="number" value="0" oninput="calculateTotal()"></td>
        <td><button class="btn btn-danger" onclick="deleteRow(this)">X</button></td>
    `;
}

function deleteRow(btn) {
    let row = btn.parentNode.parentNode;
    row.remove();
    updateSerial();
    calculateTotal();
}

function updateSerial() {
    let rows = table.rows;
    for (let i = 0; i < rows.length; i++) {
        rows[i].cells[0].innerHTML = i + 1;
    }
}

function calculateTotal() {
    let total = 0;
    let rows = table.rows;

    for (let i = 0; i < rows.length; i++) {
        let amount = rows[i].cells[4].children[0].value;
        total += parseFloat(amount) || 0;
    }

    document.getElementById("total").innerHTML = total.toLocaleString("en-IN");
}
</script>

</body>
</html>
