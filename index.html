<!DOCTYPE html>
<html>
<head>
<title>Pankaj Construction Quotation</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

.container{
background:white;
padding:20px;
max-width:900px;
margin:auto;
}

.header{
display:flex;
align-items:center;
background:linear-gradient(to right,#2e7d32,#43a047);
color:white;
padding:20px;
border-radius:10px;
}

.logo{
width:80px;
height:80px;
background:white;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
margin-right:20px;
}

.logo img{
width:60px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #ccc;
padding:8px;
text-align:left;
}

th{
background:#e8f5e9;
}

input{
width:100%;
padding:6px;
}

button{
background:#2e7d32;
color:white;
border:none;
padding:8px 15px;
margin-top:10px;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:#1b5e20;
}

.remove{
background:red;
}

.bank{
margin-top:30px;
}

.bank-row{
display:flex;
gap:20px;
}

.bank-row div{
flex:1;
}

.subtotal{
text-align:right;
margin-top:10px;
font-weight:bold;
}

@media print{

button{
display:none;
}

.action{
display:none;
}

}

</style>
</head>

<body>

<div class="container" id="invoice">

<div class="header">

<div class="logo">
<img src="1000150992.jpg">
</div>

<div>
<h2>Pankaj Construction</h2>
<p>Hno. 750/A Portawado, Siolim Goa</p>
<p>Phone: 7796174991</p>
</div>

</div>

<br>

<label>Client Name:</label>
<input id="clientName" placeholder="Enter client name">

<br><br>

<label>Invoice Date:</label>
<input id="invoiceDate" type="date">

<table id="table">

<thead>

<tr>
<th>Particulars</th>
<th>Size</th>
<th>Rate</th>
<th>Amount</th>
<th class="action">Action</th>
</tr>

</thead>

<tbody id="tbody">

<tr>

<td><input placeholder="Enter particulars"></td>
<td><input class="size"></td>
<td><input class="rate"></td>
<td><input class="amount"></td>

<td class="action">
<button class="remove" onclick="removeRow(this)">X</button>
</td>

</tr>

</tbody>

</table>

<button onclick="addRow()">+ Add Row</button>

<div class="subtotal">
Subtotal: ₹ <span id="subtotal">0.00</span>
</div>

<div class="bank">

<h3>Receiver Bank Details</h3>

<div class="bank-row">

<div>
<label>Bank No:</label>
<input id="bankNo" placeholder="Enter Bank Number">
</div>

<div>
<label>Bank Name:</label>
<input id="bankName" placeholder="Enter Bank Name">
</div>

</div>

</div>

<br>

<button onclick="generatePDF()">Generate PDF</button>

</div>

<script>

function addRow(){

let row = document.createElement("tr");

row.innerHTML=`

<td><input placeholder="Enter particulars"></td>
<td><input class="size"></td>
<td><input class="rate"></td>
<td><input class="amount"></td>

<td class="action">
<button class="remove" onclick="removeRow(this)">X</button>
</td>

`;

document.getElementById("tbody").appendChild(row);

}

function removeRow(btn){

btn.parentElement.parentElement.remove();

calculateSubtotal();

}

document.addEventListener("input",function(){

calculateSubtotal();

});

function calculateSubtotal(){

let amounts=document.querySelectorAll(".amount");

let total=0;

amounts.forEach(function(input){

let val=parseFloat(input.value);

if(!isNaN(val)){
total+=val;
}

});

document.getElementById("subtotal").innerText=total.toFixed(2);

}

function generatePDF(){

// remove placeholders
document.querySelectorAll("input").forEach(function(input){

if(input.value.trim()==""){
input.placeholder="";
}

});

window.print();

}

</script>

</body>
</html>
