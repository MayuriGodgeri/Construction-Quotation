<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pankaj Construction Quotation</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

body{
font-family:Arial;
background:#f5f5f5;
}

.quotation-box{
width:90%;
max-width:1100px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.header{
display:flex;
align-items:center;
background:linear-gradient(90deg,#2e7d32,#43a047);
color:white;
padding:20px;
border-radius:10px;
}

.header img{
height:70px;
margin-right:20px;
background:white;
padding:5px;
border-radius:10px;
}

.details{
display:flex;
justify-content:space-between;
margin:20px 0;
flex-wrap:wrap;
}

.details input{
padding:8px;
border-radius:5px;
border:1px solid #ccc;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #c8e6c9;
padding:10px;
text-align:left;
vertical-align:top;
word-break:break-word;
}

th{
background:#e8f5e9;
}

.particulars{
width:100%;
min-height:40px;
border:1px solid #ccc;
border-radius:5px;
padding:6px;
resize:none;
box-sizing:border-box;
}

td input{
width:100%;
padding:6px;
border-radius:5px;
border:1px solid #ccc;
}

.buttons button{
background:#2e7d32;
color:white;
border:none;
padding:8px 15px;
border-radius:5px;
margin-right:10px;
cursor:pointer;
}

.subtotal{
text-align:right;
font-weight:bold;
margin-top:10px;
}

.bank-row{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:10px;
}

.bank-row input{
padding:6px;
border:1px solid #ccc;
border-radius:5px;
}

.hide-in-pdf{
display:block;
}

.pdf-text{
white-space:pre-wrap;
word-break:break-word;
}

</style>

</head>

<body>

<div class="quotation-box" id="quotation-box">

<div class="header">

<img src="10001509921.png">

<div>
<h2>Pankaj Construction</h2>
<p>Hno. 750/A Portawado, Siolim Goa</p>
<p>Phone: 7796174991</p>
</div>

</div>

<div class="details">

<div>
<label>Client Name:</label>
<input type="text" id="client-name">
</div>

<div>
<label>Invoice Date:</label>
<input type="date" id="invoice-date">
</div>

</div>

<table id="quotation-table">

<thead>
<tr>
<th>Particulars</th>
<th>Size</th>
<th>Rate</th>
<th>Amount</th>
<th class="action-column">Action</th>
</tr>
</thead>

<tbody>

<tr>

<td>
<textarea class="particulars"></textarea>
</td>

<td>
<input type="text">
</td>

<td>
<input type="number">
</td>

<td>
<input type="number" oninput="calculateSubtotal()">
</td>

<td class="action-column">
<button onclick="removeRow(this)">X</button>
</td>

</tr>

</tbody>

</table>

<div class="buttons hide-in-pdf">

<button onclick="addRow()">Add Row</button>

</div>

<div class="subtotal" id="subtotal">
Subtotal: ₹ 0.00
</div>

<h3>Receiver Bank Details</h3>

<div class="bank-row">

<label>Bank No:</label>
<input type="text">

<label>Bank Name:</label>
<input type="text">

</div>

<br>

<button id="generate-pdf" class="hide-in-pdf">
Generate PDF
</button>

</div>

<script>

function addRow(){

let table=document.querySelector("#quotation-table tbody");

let row=table.insertRow();

row.innerHTML=`
<td><textarea class="particulars"></textarea></td>
<td><input type="text"></td>
<td><input type="number"></td>
<td><input type="number" oninput="calculateSubtotal()"></td>
<td class="action-column"><button onclick="removeRow(this)">X</button></td>
`;

}

function removeRow(btn){

btn.parentElement.parentElement.remove();

calculateSubtotal();

}

function calculateSubtotal(){

let total=0;

document.querySelectorAll("#quotation-table tbody tr").forEach(row=>{

let val=row.cells[3].querySelector("input").value;

if(val) total+=parseFloat(val);

});

document.getElementById("subtotal").innerText="Subtotal: ₹ "+total.toFixed(2);

}

document.getElementById("generate-pdf").addEventListener("click",()=>{

/* convert textarea to normal text for pdf */

document.querySelectorAll(".particulars").forEach(area=>{

let div=document.createElement("div");

div.className="pdf-text";

div.innerText=area.value;

area.style.display="none";

area.parentNode.appendChild(div);

});

document.querySelectorAll(".hide-in-pdf").forEach(el=>el.style.display="none");
document.querySelectorAll(".action-column").forEach(el=>el.style.display="none");

let element=document.getElementById("quotation-box");

html2pdf().from(element).save("quotation.pdf").then(()=>{

location.reload();

});

});

</script>

</body>
</html>
