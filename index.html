```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pankaj Construction Quotation</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:Poppins,sans-serif;
background:#f5f5f5;
margin:0;
padding:20px;
}

.quotation-box{
max-width:1000px;
margin:auto;
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.header{
display:flex;
align-items:center;
background:linear-gradient(90deg,#2e7d32,#43a047);
color:white;
padding:20px;
border-radius:10px;
}

.header img{
height:60px;
margin-right:15px;
background:white;
border-radius:8px;
padding:5px;
}

.details{
margin:20px 0;
}

.details input{
padding:6px;
border-radius:6px;
border:1px solid #ccc;
margin-left:10px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #c8e6c9;
padding:10px;
vertical-align:top;
}

th{
background:#e8f5e9;
}

textarea{
width:100%;
min-height:60px;
border-radius:6px;
border:1px solid #ccc;
padding:6px;
resize:vertical;
}

td input{
width:100%;
padding:6px;
border-radius:6px;
border:1px solid #ccc;
}

.buttons{
margin-top:10px;
}

.buttons button{
background:#2e7d32;
color:white;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
margin-right:5px;
}

.subtotal{
text-align:right;
font-weight:bold;
margin-top:10px;
}

.bank-details{
margin-top:25px;
}

.bank-details h3{
color:#2e7d32;
}

.bank-row{
margin-top:8px;
}

.bank-row input{
padding:6px;
border-radius:6px;
border:1px solid #ccc;
margin-left:10px;
}

</style>
</head>

<body>

<div class="quotation-box">

<div class="header">
<img src="https://raw.githubusercontent.com/MayuriGodgeri/Construction-Quotation/main/10001509921.png">
<div>
<h2>Pankaj Construction</h2>
<p>Hno. 750/A Portawado, Siolim Goa</p>
<p>Phone: 7796174991</p>
</div>
</div>

<div class="details">
<label>Client Name:</label>
<input type="text" id="client-name">

<label style="margin-left:20px;">Invoice Date:</label>
<input type="date" id="invoice-date">
</div>

<table id="quotation-table">
<thead>
<tr>
<th>Particulars</th>
<th>Size</th>
<th>Rate</th>
<th>Amount</th>
<th>Action</th>
</tr>
</thead>

<tbody>
<tr>
<td><textarea></textarea></td>
<td><input type="text"></td>
<td><input type="number"></td>
<td><input type="number" oninput="calculateSubtotal()"></td>
<td><button onclick="removeRow(this)">X</button></td>
</tr>
</tbody>
</table>

<div class="buttons">
<button onclick="addRow()">+ Add Row</button>
</div>

<div class="subtotal" id="subtotal">Subtotal: ₹ 0.00</div>

<div class="bank-details">
<h3>Receiver Bank Details</h3>

<div class="bank-row">
<label>Bank No:</label>
<input type="text" id="bank-no">

<label style="margin-left:20px;">Bank Name:</label>
<input type="text" id="bank-name">
</div>
</div>

<button onclick="generatePDF()">Generate PDF</button>

</div>

<script>

function addRow(){
let table=document.querySelector("#quotation-table tbody");

let row=table.insertRow();

row.innerHTML=`
<td><textarea></textarea></td>
<td><input type="text"></td>
<td><input type="number"></td>
<td><input type="number" oninput="calculateSubtotal()"></td>
<td><button onclick="removeRow(this)">X</button></td>
`;
}

function removeRow(btn){
btn.parentElement.parentElement.remove();
calculateSubtotal();
}

function calculateSubtotal(){
let total=0;

document.querySelectorAll("#quotation-table tbody tr").forEach(row=>{
let val=row.cells[3].querySelector("input").value;
if(val) total+=parseFloat(val);
});

document.getElementById("subtotal").innerText="Subtotal: ₹ "+total.toFixed(2);
}

function generatePDF(){

const { jsPDF } = window.jspdf;
const doc = new jsPDF();

let y = 10;

/* HEADER */
doc.setFontSize(16);
doc.text("Pankaj Construction", 10, y);
y += 8;

doc.setFontSize(10);
doc.text("Hno. 750/A Portawado, Siolim Goa", 10, y);
y += 5;
doc.text("Phone: 7796174991", 10, y);
y += 10;

/* CLIENT */
let client=document.getElementById("client-name").value || "";
let date=document.getElementById("invoice-date").value || "";

doc.text(`Client: ${client}`, 10, y);
doc.text(`Date: ${date}`, 140, y);
y += 10;

/* TABLE HEADER */
doc.setFontSize(11);
doc.text("Particulars", 10, y);
doc.text("Size", 90, y);
doc.text("Rate", 120, y);
doc.text("Amount", 160, y);
y += 6;

doc.line(10, y, 200, y);
y += 4;

/* DATA */
let total=0;

document.querySelectorAll("#quotation-table tbody tr").forEach(row=>{

let p=row.cells[0].querySelector("textarea").value || "";
let s=row.cells[1].querySelector("input").value || "";
let r=row.cells[2].querySelector("input").value || "";
let a=row.cells[3].querySelector("input").value || "";

total += parseFloat(a) || 0;

let split = doc.splitTextToSize(p, 70);

doc.text(split, 10, y);
doc.text(s, 90, y);
doc.text(r, 120, y);
doc.text(a, 160, y);

y += (split.length * 5) + 2;

if(y > 270){
doc.addPage();
y = 10;
}

});

/* TOTAL */
y += 5;
doc.line(10, y, 200, y);
y += 8;

doc.text(`Subtotal: ₹ ${total.toFixed(2)}`, 140, y);

/* BANK */
y += 15;

doc.text("Receiver Bank Details", 10, y);
y += 6;

let bankNo=document.getElementById("bank-no").value || "";
let bankName=document.getElementById("bank-name").value || "";

doc.text(`Bank No: ${bankNo}`, 10, y);
y += 6;
doc.text(`Bank Name: ${bankName}`, 10, y);

/* SAVE */
doc.save("Quotation.pdf");

}

</script>

</body>
</html>
```
