<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pankaj Construction Quotation</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

body{
font-family:Arial;
margin:20px;
}

.header{
margin-bottom:20px;
}

h1{
margin:0;
}

.details{
display:flex;
justify-content:space-between;
margin:20px 0;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border-bottom:1px solid #000;
padding:8px;
text-align:left;
vertical-align:top;
}

.subtotal{
margin-top:20px;
text-align:right;
font-weight:bold;
}

.bank{
margin-top:40px;
}

</style>
</head>

<body>

<div id="quotation">

<div class="header">
<h1>Pankaj Construction</h1>
<p>Hno. 750/A Portawado, Siolim Goa</p>
<p>Phone: 7796174991</p>
</div>

<div class="details">
<div>Client: <span id="pdf-client"></span></div>
<div>Date: <span id="pdf-date"></span></div>
</div>

<table>
<thead>
<tr>
<th>Particulars</th>
<th>Size</th>
<th>Rate</th>
<th>Amount</th>
</tr>
</thead>

<tbody id="pdf-body"></tbody>

</table>

<div class="subtotal" id="pdf-total"></div>

<div class="bank">
<h3>Receiver Bank Details</h3>
<p>Bank No: <span id="pdf-bankno"></span></p>
<p>Bank Name: <span id="pdf-bankname"></span></p>
</div>

</div>

<hr>

<!-- FORM -->
<h3>Enter Data</h3>

Client: <input id="client"><br><br>
Date: <input type="date" id="date"><br><br>

<textarea id="particular" placeholder="Particulars"></textarea><br>
<input id="size" placeholder="Size">
<input id="rate" placeholder="Rate">
<input id="amount" placeholder="Amount"><br><br>

<button onclick="addRow()">Add Row</button>

<br><br>

Bank No: <input id="bankno"><br><br>
Bank Name: <input id="bankname"><br><br>

<button onclick="generatePDF()">Generate PDF</button>

<script>

let data=[];

function addRow(){

const particular=document.getElementById("particular").value;
const size=document.getElementById("size").value;
const rate=document.getElementById("rate").value;
const amount=document.getElementById("amount").value;

data.push({particular,size,rate,amount});

alert("Row Added");

}

function generatePDF(){

// SET HEADER
document.getElementById("pdf-client").textContent=document.getElementById("client").value;
document.getElementById("pdf-date").textContent=document.getElementById("date").value;

// TABLE BUILD
let tbody=document.getElementById("pdf-body");
tbody.innerHTML="";

let total=0;

data.forEach(row=>{

let tr=document.createElement("tr");

tr.innerHTML=`
<td>${row.particular || ""}</td>
<td>${row.size || ""}</td>
<td>${row.rate || ""}</td>
<td>${row.amount || ""}</td>
`;

tbody.appendChild(tr);

total+=parseFloat(row.amount)||0;

});

// TOTAL FIX (IMPORTANT)
document.getElementById("pdf-total").textContent="Total: ₹ "+total.toFixed(2);

// BANK
document.getElementById("pdf-bankno").textContent=document.getElementById("bankno").value;
document.getElementById("pdf-bankname").textContent=document.getElementById("bankname").value;

// GENERATE PDF
html2pdf().from(document.getElementById("quotation")).save();

}

</script>

</body>
</html>
