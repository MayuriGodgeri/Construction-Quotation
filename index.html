```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pankaj Construction Quotation</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

body{
font-family:Poppins, sans-serif;
background:#f5f5f5;
margin:0;
padding:20px;
}

.quotation-box{
max-width:1000px;
margin:auto;
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.header{
display:flex;
align-items:center;
background:linear-gradient(90deg,#2e7d32,#43a047);
color:white;
padding:20px;
border-radius:10px;
}

.header img{
height:60px;
margin-right:15px;
background:white;
border-radius:8px;
padding:5px;
}

.details{
margin:20px 0;
}

.details input{
padding:6px;
border-radius:6px;
border:1px solid #ccc;
margin-left:10px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #c8e6c9;
padding:8px;
vertical-align:top;
}

th{
background:#e8f5e9;
}

textarea{
width:100%;
min-height:60px;
border-radius:6px;
border:1px solid #ccc;
padding:6px;
resize:vertical;
}

td input{
width:100%;
padding:6px;
border-radius:6px;
border:1px solid #ccc;
}

.buttons{
margin-top:10px;
}

.buttons button{
background:#2e7d32;
color:white;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
margin-right:5px;
}

.subtotal{
text-align:right;
font-weight:bold;
margin-top:10px;
}

.bank-details{
margin-top:25px;
}

.bank-details h3{
color:#2e7d32;
}

.bank-row{
margin-top:8px;
}

.bank-row input{
padding:6px;
border-radius:6px;
border:1px solid #ccc;
margin-left:10px;
}

.hide-in-pdf{
display:block;
}

</style>
</head>

<body>

<div class="quotation-box" id="quotation-box">

<div class="header">
<img src="https://raw.githubusercontent.com/MayuriGodgeri/Construction-Quotation/main/10001509921.png">
<div>
<h2>Pankaj Construction</h2>
<p>Hno. 750/A Portawado, Siolim Goa</p>
<p>Phone: 7796174991</p>
</div>
</div>

<div class="details">
<label>Client Name:</label>
<input type="text" id="client-name">

<label style="margin-left:20px;">Invoice Date:</label>
<input type="date" id="invoice-date">
</div>

<table id="quotation-table">

<thead>
<tr>
<th>Particulars</th>
<th>Size</th>
<th>Rate</th>
<th>Amount</th>
<th class="hide-in-pdf">Action</th>
</tr>
</thead>

<tbody>

<tr>
<td><textarea></textarea></td>
<td><input type="text"></td>
<td><input type="number"></td>
<td><input type="number" oninput="calculateSubtotal()"></td>
<td class="hide-in-pdf">
<button onclick="removeRow(this)">X</button>
</td>
</tr>

</tbody>
</table>

<div class="buttons hide-in-pdf">
<button onclick="addRow()">+ Add Row</button>
</div>

<div class="subtotal" id="subtotal">Subtotal: ₹ 0.00</div>

<div class="bank-details">
<h3>Receiver Bank Details</h3>
<div class="bank-row">
<label>Bank No:</label>
<input type="text">

<label style="margin-left:20px;">Bank Name:</label>
<input type="text">
</div>
</div>

<button id="generate-pdf" class="hide-in-pdf">Generate PDF</button>

</div>

<script>

function addRow(){
let table=document.querySelector("#quotation-table tbody");
let row=table.insertRow();

row.innerHTML=`
<td><textarea></textarea></td>
<td><input type="text"></td>
<td><input type="number"></td>
<td><input type="number" oninput="calculateSubtotal()"></td>
<td class="hide-in-pdf"><button onclick="removeRow(this)">X</button></td>
`;
}

function removeRow(btn){
btn.parentElement.parentElement.remove();
calculateSubtotal();
}

function calculateSubtotal(){
let total=0;

document.querySelectorAll("#quotation-table tbody tr").forEach(row=>{
let val=row.cells[3].querySelector("input").value;
if(val) total+=parseFloat(val);
});

document.getElementById("subtotal").innerText="Subtotal: ₹ "+total.toFixed(2);
}

document.getElementById("generate-pdf").addEventListener("click",()=>{

const element=document.getElementById("quotation-box");

/* clone node to avoid textarea rendering issues */
let clone=element.cloneNode(true);

/* convert textarea to text */
clone.querySelectorAll("textarea").forEach(t=>{
let div=document.createElement("div");
div.style.whiteSpace="pre-wrap";
div.innerText=t.value;
t.parentNode.replaceChild(div,t);
});

/* hide buttons */
clone.querySelectorAll(".hide-in-pdf").forEach(el=>el.remove());

const opt={
margin:0.5,
filename:"Quotation.pdf",
html2canvas:{scale:2},
jsPDF:{unit:'in',format:'a4',orientation:'portrait'}
};

html2pdf().set(opt).from(clone).save();

});

</script>

</body>
</html>
```
