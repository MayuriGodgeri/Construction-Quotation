<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pankaj Construction Quotation</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

body{
font-family:"Poppins",sans-serif;
background:#fafafa;
margin:0;
padding:0;
}

.quotation-box{
width:90%;
max-width:1100px;
background:#fff;
margin:20px auto;
padding:20px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.header{
display:flex;
align-items:center;
background:linear-gradient(90deg,#2e7d32,#43a047);
color:white;
padding:20px;
border-radius:12px 12px 0 0;
}

.header img{
height:70px;
width:70px;
margin-right:20px;
background:white;
border-radius:10px;
padding:5px;
}

.header-text h1{
margin:0;
font-size:26px;
font-weight:bold;
}

.details{
display:flex;
justify-content:space-between;
margin:20px 0;
flex-wrap:wrap;
}

.details input{
padding:8px;
border-radius:6px;
border:1px solid #ccc;
width:200px;
}

table{
width:100%;
border-collapse:collapse;
margin-bottom:10px;
}

th,td{
border:1px solid #c8e6c9;
padding:10px;
text-align:left;
vertical-align:top;
word-break:break-word;
}

th{
background:#e8f5e9;
}

textarea{
width:100%;
min-height:60px;
resize:vertical;
padding:6px;
box-sizing:border-box;
}

td input{
width:100%;
border:1px solid #ccc;
border-radius:6px;
padding:6px;
}

.buttons{
margin:10px 0;
}

.buttons button{
background:#2e7d32;
color:white;
border:none;
padding:8px 15px;
margin-right:10px;
border-radius:6px;
cursor:pointer;
}

.subtotal{
text-align:right;
font-weight:bold;
margin-top:10px;
font-size:16px;
page-break-inside:avoid;
}

.bank-details{
margin-top:25px;
page-break-inside:avoid;
}

.bank-details h3{
color:#2e7d32;
margin-bottom:10px;
}

.bank-row{
display:flex;
align-items:center;
gap:15px;
flex-wrap:wrap;
margin-bottom:10px;
}

.bank-row input{
flex:1;
min-width:180px;
padding:6px;
border-radius:6px;
border:1px solid #ccc;
}

#generate-pdf{
background:#2e7d32;
color:white;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

.hide-in-pdf{
display:block;
}

.action-column{
}

@media print{
.hide-in-pdf{
display:none!important;
}
}

</style>
</head>

<body>

<div class="quotation-box" id="quotation-box">

<div class="header">
<img src="https://raw.githubusercontent.com/MayuriGodgeri/Construction-Quotation/main/10001509921.png">

<div class="header-text">
<h1>Pankaj Construction</h1>
<p>Hno. 750/A Portawado, Siolim Goa</p>
<p>Phone: 7796174991</p>
</div>
</div>

<div class="details">
<div>
<label>Client Name:</label>
<input type="text" id="client-name">
</div>

<div>
<label>Invoice Date:</label>
<input type="date" id="invoice-date">
</div>
</div>

<table id="quotation-table">

<thead>
<tr>
<th>Particulars</th>
<th>Size</th>
<th>Rate</th>
<th>Amount</th>
<th class="action-column">Action</th>
</tr>
</thead>

<tbody>

<tr>
<td><textarea placeholder="Enter particulars"></textarea></td>
<td><input type="text"></td>
<td><input type="number"></td>
<td><input type="number" oninput="calculateSubtotal()"></td>
<td class="action-column">
<button onclick="removeRow(this)" style="background:#e53935;color:white;border:none;padding:6px 10px;border-radius:5px;">
<i class="fa fa-times"></i>
</button>
</td>
</tr>

</tbody>
</table>

<div class="buttons hide-in-pdf">
<button onclick="addRow()">+ Add Row</button>
</div>

<div class="subtotal" id="subtotal">Subtotal: ₹ 0.00</div>

<div class="bank-details">
<h3>Receiver Bank Details</h3>

<div class="bank-row">
<label>Bank No:</label>
<input type="text">

<label>Bank Name:</label>
<input type="text">
</div>

<button id="generate-pdf" class="hide-in-pdf">Generate PDF</button>

</div>

</div>

<script>

function addRow(){
const table=document.querySelector("#quotation-table tbody");
const newRow=table.insertRow();

newRow.innerHTML=`
<td><textarea placeholder="Enter particulars"></textarea></td>
<td><input type="text"></td>
<td><input type="number"></td>
<td><input type="number" oninput="calculateSubtotal()"></td>
<td class="action-column">
<button onclick="removeRow(this)" style="background:#e53935;color:white;border:none;padding:6px 10px;border-radius:5px;">
<i class="fa fa-times"></i>
</button>
</td>
`;
}

function removeRow(button){
button.parentElement.parentElement.remove();
calculateSubtotal();
}

function calculateSubtotal(){
let total=0;

document.querySelectorAll("#quotation-table tbody tr").forEach(row=>{
const amountInput=row.cells[3].querySelector("input");
const amount=parseFloat(amountInput.value)||0;
total+=amount;
});

document.getElementById("subtotal").textContent="Subtotal: ₹ "+total.toFixed(2);
}

document.getElementById("generate-pdf").addEventListener("click",()=>{

const actionColumns=document.querySelectorAll(".action-column");
actionColumns.forEach(col=>col.style.display="none");

document.querySelectorAll(".hide-in-pdf").forEach(el=>el.style.display="none");

const clientName=document.getElementById("client-name").value||"Client";
const element=document.getElementById("quotation-box");

const opt={
margin:0.5,
filename:`Quotation_${clientName}.pdf`,
image:{type:'jpeg',quality:1},
html2canvas:{
scale:2,
useCORS:true,
scrollY:0
},
jsPDF:{
unit:'in',
format:'a4',
orientation:'portrait'
},
pagebreak:{
mode:['css','legacy']
}
};

html2pdf().set(opt).from(element).save().then(()=>{
actionColumns.forEach(col=>col.style.display="");
document.querySelectorAll(".hide-in-pdf").forEach(el=>el.style.display="block");
});

});

</script>

</body>
</html>
