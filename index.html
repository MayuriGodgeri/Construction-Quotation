```html
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pankaj Construction Quotation</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

body{
font-family:Arial, sans-serif;
background:#f4f4f4;
}

.quotation-box{
width:90%;
max-width:1100px;
background:#fff;
margin:20px auto;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.header{
display:flex;
align-items:center;
background:linear-gradient(90deg,#2e7d32,#43a047);
color:white;
padding:20px;
border-radius:10px 10px 0 0;
}

.header img{
height:70px;
margin-right:20px;
background:white;
border-radius:10px;
padding:5px;
}

.header-text h1{
margin:0;
}

.details{
display:flex;
justify-content:space-between;
margin:20px 0;
flex-wrap:wrap;
}

.details input{
padding:8px;
border:1px solid #ccc;
border-radius:6px;
}

table{
width:100%;
border-collapse:collapse;
margin-bottom:10px;
}

th,td{
border:1px solid #c8e6c9;
padding:10px;
text-align:left;
vertical-align:top;
}

th{
background:#e8f5e9;
}

td input{
width:100%;
padding:6px;
border-radius:5px;
border:1px solid #ccc;
}

/* PARTICULARS TEXTAREA */

.particulars{
width:100%;
min-height:40px;
border:1px solid #ccc;
border-radius:5px;
padding:6px;
resize:none;
box-sizing:border-box;
overflow-wrap:anywhere;
word-break:break-word;
}

.buttons button{
background:#2e7d32;
color:white;
border:none;
padding:8px 15px;
margin-right:10px;
border-radius:6px;
cursor:pointer;
}

.buttons button:hover{
background:#1b5e20;
}

.subtotal{
text-align:right;
font-weight:bold;
margin-top:10px;
}

.bank-row{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.bank-row input{
padding:6px;
border:1px solid #ccc;
border-radius:6px;
}

.hide-in-pdf{
display:block;
}

</style>

</head>

<body>

<div class="quotation-box" id="quotation-box">

<div class="header">

<img src="10001509921.png">

<div class="header-text">
<h1>Pankaj Construction</h1>
<p>Hno. 750/A Portawado, Siolim Goa</p>
<p>Phone: 7796174991</p>
</div>

</div>

<div class="details">

<div>
<label>Client Name:</label>
<input type="text" id="client-name" placeholder="Enter client name">
</div>

<div>
<label>Invoice Date:</label>
<input type="date" id="invoice-date">
</div>

</div>

<table id="quotation-table">

<thead>
<tr>
<th>Particulars</th>
<th>Size</th>
<th>Rate</th>
<th>Amount</th>
<th class="action-column">Action</th>
</tr>
</thead>

<tbody>

<tr>

<td>
<textarea class="particulars" placeholder="Enter particulars" oninput="autoResize(this)"></textarea>
</td>

<td><input type="text" placeholder="Enter size"></td>

<td><input type="number" placeholder="Rate"></td>

<td>
<input type="number" placeholder="Amount" oninput="calculateSubtotal()">
</td>

<td class="action-column">
<button onclick="removeRow(this)" style="background:red;color:white;border:none;padding:5px 10px;border-radius:5px;">
<i class="fa fa-times"></i>
</button>
</td>

</tr>

</tbody>

</table>

<div class="buttons hide-in-pdf">

<button onclick="addRow()">Add Row</button>

</div>

<div class="subtotal" id="subtotal">Subtotal: ₹ 0.00</div>

<div class="bank-details">

<h3>Receiver Bank Details</h3>

<div class="bank-row">

<label>Bank No:</label>
<input type="text">

<label>Bank Name:</label>
<input type="text">

</div>

<button id="generate-pdf" class="hide-in-pdf">Generate PDF</button>

</div>

</div>

<script>

function autoResize(field){

field.style.height="auto";
field.style.height=field.scrollHeight+"px";

}

function addRow(){

const table=document.querySelector("#quotation-table tbody");

const newRow=table.insertRow();

newRow.innerHTML=`

<td>
<textarea class="particulars" placeholder="Enter particulars" oninput="autoResize(this)"></textarea>
</td>

<td><input type="text" placeholder="Enter size"></td>

<td><input type="number" placeholder="Rate"></td>

<td>
<input type="number" placeholder="Amount" oninput="calculateSubtotal()">
</td>

<td class="action-column">
<button onclick="removeRow(this)" style="background:red;color:white;border:none;padding:5px 10px;border-radius:5px;">
<i class="fa fa-times"></i>
</button>
</td>

`;

}

function removeRow(button){

button.parentElement.parentElement.remove();
calculateSubtotal();

}

function calculateSubtotal(){

let total=0;

document.querySelectorAll("#quotation-table tbody tr").forEach(row=>{

const amount=row.querySelector("td:nth-child(4) input");

if(amount && amount.value){

total+=parseFloat(amount.value);

}

});

document.getElementById("subtotal").innerText="Subtotal: ₹ "+total.toFixed(2);

}

document.getElementById("generate-pdf").addEventListener("click",()=>{

document.querySelectorAll(".hide-in-pdf").forEach(el=>el.style.display="none");
document.querySelectorAll(".action-column").forEach(el=>el.style.display="none");

const element=document.getElementById("quotation-box");

html2pdf().from(element).save("quotation.pdf").then(()=>{

document.querySelectorAll(".hide-in-pdf").forEach(el=>el.style.display="block");
document.querySelectorAll(".action-column").forEach(el=>el.style.display="");

});
```
