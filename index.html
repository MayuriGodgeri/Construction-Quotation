<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Construction Billing</title>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 40px;
        background: #f5f5f5;
    }

    .container {
        background: #fff;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    table {
        width: 100%;
        border-collapse: collapse;
    }

    table th, table td {
        border: 1px solid #ccc;
        padding: 10px;
        text-align: center;
    }

    table th {
        background: #eee;
    }

    input {
        width: 100%;
        border: none;
        text-align: center;
    }

    .btn {
        padding: 10px 15px;
        margin: 10px 5px;
        border: none;
        background: #007bff;
        color: #fff;
        cursor: pointer;
        border-radius: 5px;
    }

    .btn-danger {
        background: red;
    }

    .total {
        text-align: right;
        font-size: 18px;
        margin-top: 20px;
    }

    @media print {
        .btn {
            display: none;
        }
        body {
            background: #fff;
        }
    }
</style>
</head>
<body>

<div class="container">
    <h2>Construction Work Billing</h2>

    <table id="billingTable">
        <thead>
            <tr>
                <th>Sr No</th>
                <th>Particular</th>
                <th>Quantity</th>
                <th>Rate</th>
                <th>Amount</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
        </tbody>
    </table>

    <button class="btn" onclick="addRow()">+ Add Row</button>
    <button class="btn" onclick="calculateTotal()">Calculate Total</button>
    <button class="btn" onclick="window.print()">Print / Save PDF</button>

    <div class="total">
        <strong>Total Work Charge: ₹ <span id="total">0</span></strong>
    </div>
</div>

<script>
let table = document.getElementById("billingTable").getElementsByTagName('tbody')[0];

function addRow() {
    let rowCount = table.rows.length;
    let row = table.insertRow();

    row.innerHTML = `
        <td>${rowCount + 1}</td>
        <td><input type="text" placeholder="Enter work"></td>
        <td><input type="number" value="1" onchange="calculateRow(this)"></td>
        <td><input type="number" value="0" onchange="calculateRow(this)"></td>
        <td class="amount">0</td>
        <td><button class="btn btn-danger" onclick="deleteRow(this)">X</button></td>
    `;
}

function deleteRow(btn) {
    let row = btn.parentNode.parentNode;
    row.remove();
    updateSerial();
    calculateTotal();
}

function updateSerial() {
    let rows = table.rows;
    for (let i = 0; i < rows.length; i++) {
        rows[i].cells[0].innerHTML = i + 1;
    }
}

function calculateRow(input) {
    let row = input.parentNode.parentNode;
    let qty = row.cells[2].children[0].value;
    let rate = row.cells[3].children[0].value;

    let amount = qty * rate;
    row.cells[4].innerHTML = amount.toFixed(2);

    calculateTotal();
}

function calculateTotal() {
    let total = 0;
    let rows = table.rows;

    for (let i = 0; i < rows.length; i++) {
        total += parseFloat(rows[i].cells[4].innerHTML) || 0;
    }

    document.getElementById("total").innerHTML = total.toLocaleString("en-IN");
}

// Add default rows based on your sample
window.onload = function() {
    const sampleItems = [
        "154 Running meter",
        "Digging foundations",
        "Rubber soling",
        "PCC",
        "Foundations Construction",
        "Top 5 layer kudchi construction",
        "Every 3.5 meter pillar"
    ];

    sampleItems.forEach(item => {
        addRow();
        let lastRow = table.rows[table.rows.length - 1];
        lastRow.cells[1].children[0].value = item;
    });
};
</script>

</body>
</html>
